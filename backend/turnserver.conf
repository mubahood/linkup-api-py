# coturn TURN server configuration for NegoRide Canada
# Install: brew install coturn (macOS) or apt install coturn (Linux)
# Run: turnserver -c turnserver.conf --listening-ip=<LOCAL_IP> --relay-ip=<LOCAL_IP>

listening-port=3478
min-port=49152
max-port=65535

realm=negoride.local
lt-cred-mech
user=negoride:negoride2026

fingerprint
server-name=negoride-turn

no-tls
no-dtls
no-cli
log-file=stdout
verbose
